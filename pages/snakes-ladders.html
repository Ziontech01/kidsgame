<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Snakes &amp; Ladders</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="background:linear-gradient(135deg,#f0fdf4,#ecfdf5);min-height:100vh">

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🐍🪜</div>
    <div class="spinner"></div>
    <div class="loading-title">Snakes &amp; Ladders</div>
  </div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html"><span class="logo-emoji">🎮</span> Happy Games</a>
  <div class="nav-links">
    <span class="nav-user" id="nav-username" style="display:none">👤</span>
    <a href="../login.html" class="btn btn-secondary" id="nav-login-btn" style="font-size:.85rem">🔑 Login</a>
    <a href="../index.html" class="btn btn-secondary" style="font-size:.85rem">🏠 Home</a>
    <button class="btn btn-outline" id="nav-logout-btn" style="display:none;font-size:.85rem" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<!-- Main layout -->
<div class="sl-page">
  <div class="sl-game-area">

    <!-- LEFT PANEL — You -->
    <div class="sl-side-panel sl-you-panel">
      <div class="sl-panel-piece">🔵</div>
      <div class="sl-panel-name">You</div>
      <div class="sl-dice-sm" id="sl-dice-you">🎲</div>
      <div class="sl-last-roll-label">Last Roll</div>
      <div class="sl-last-roll" id="sl-you-roll">—</div>
      <button class="btn btn-primary sl-roll-btn" id="sl-roll-btn" onclick="SnakesLadders.rollDice()">
        🎲 Roll!
      </button>
      <button class="btn btn-secondary sl-roll-btn" onclick="SnakesLadders._startVsFriend()" style="margin-top:8px;font-size:.82rem">
        🤝 vs Friend
      </button>
    </div>

    <!-- CENTER — Board + status + legend -->
    <div class="sl-board-area">
      <div class="sl-status" id="sl-status">Loading…</div>
      <div class="sl-board" id="sl-board"></div>
      <div class="sl-legend">
        <span>🐍 Snake = go down</span>
        <span>🪜 Ladder = go up</span>
        <span>🔵 You &nbsp; 🔴 Computer</span>
      </div>
    </div>

    <!-- RIGHT PANEL — Computer -->
    <div class="sl-side-panel sl-comp-panel">
      <div class="sl-panel-piece">🔴</div>
      <div class="sl-panel-name">Computer</div>
      <div class="sl-dice-sm" id="sl-dice-comp">🎲</div>
      <div class="sl-last-roll-label">Last Roll</div>
      <div class="sl-last-roll" id="sl-comp-roll">—</div>
    </div>

  </div>
</div>

<!-- End-game overlay -->
<div class="sl-end-overlay" id="sl-end" style="display:none">
  <div class="sl-end-card">
    <div class="sl-end-icon" id="sl-end-icon">🏆</div>
    <div class="sl-end-title" id="sl-end-title">You Win!</div>
    <div class="sl-end-msg" id="sl-end-msg"></div>
    <div class="sl-end-stats" id="sl-end-stats"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="btn btn-primary btn-lg" onclick="SnakesLadders.restartGame()">🔄 Play Again</button>
      <a href="../index.html" class="btn btn-secondary">🏠 Home</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/snakes-ladders.js"></script>
<script>
softAuth(() => { SnakesLadders.init(); });
</script>
</body>
</html>
