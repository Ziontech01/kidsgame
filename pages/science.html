<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Science Quiz</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body style="background:linear-gradient(135deg,#f0fff4,#e0f7fa);min-height:100vh">

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🔬</div>
    <div class="spinner"></div>
    <div class="loading-title">Science Quiz</div>
  </div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html"><span class="logo-emoji">🎮</span> Happy Games</a>
  <div class="nav-links">
    <span class="nav-user" id="nav-username" style="display:none">👤</span>
    <a href="../login.html" class="btn btn-secondary" id="nav-login-btn" style="font-size:.85rem">🔑 Login</a>
    <a href="../index.html" class="btn btn-secondary" style="font-size:.85rem">🏠 Home</a>
    <button class="btn btn-outline" id="nav-logout-btn" style="display:none;font-size:.85rem" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<div class="quiz-page-wrap" id="quiz-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/questions/science.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/quiz-engine.js"></script>
<script>
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

softAuth(() => {
  QuizEngine.init({
    gameType:     'science',
    title:        'Science Quiz',
    icon:         '🔬',
    containerId:  'quiz-container',
    getQuestions: (level) => {
      const pool = SCIENCE_QUESTIONS[level] || SCIENCE_QUESTIONS.year3;
      return shuffle(pool).slice(0, 10);
    }
  });
});
</script>
</body>
</html>
