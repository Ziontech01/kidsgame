<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Ludo</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    /* ── Game mode toggle ─────────────────────────────────────── */
    .ludo-gamemode-btns { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
    .ludo-gamemode-btn {
      flex: 1;
      max-width: 200px;
      border: 3px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 12px;
      background: #fff;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Nunito', sans-serif;
      text-align: center;
    }
    .ludo-gamemode-btn:hover { border-color: #6366f1; }
    .ludo-gamemode-btn.selected { border-color: #6366f1; background: #ede9fe; }
    .ludo-gamemode-icon  { font-size: 1.6rem; display: block; margin-bottom: 4px; }
    .ludo-gamemode-label { font-weight: 800; font-size: .9rem; color: #1a1a2e; display: block; }
    .ludo-gamemode-sub   { font-size: .72rem; color: #6b7280; font-weight: 600; display: block; margin-top: 2px; }
    .ludo-gamemode-rec   {
      font-size: .7rem; color: #6366f1; font-weight: 800;
      margin-top: 6px; display: block;
    }

    /* ── Mode badge in game ───────────────────────────────────── */
    .ludo-mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #ede9fe;
      color: #4f46e5;
      border-radius: 50px;
      padding: 3px 12px;
      font-size: .75rem;
      font-weight: 800;
    }

    /* ── Active home glow
         NO filter / opacity / transform — those create per-cell stacking contexts
         which bury piece z-indexes. Use background-image overlay instead.        */
    .lc-home-active {
      background-image: linear-gradient(rgba(255,255,255,.22), rgba(255,255,255,.22)) !important;
    }

    /* ── Piece tokens — always above every home-zone layer ────── */
    .lc-piece {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      position: relative !important;
      z-index: 20 !important;
    }
    /* Token emoji — scales with board width so it's always readable */
    .lc-tok {
      font-size: min(14px, 3.2vw);
      line-height: 1;
      display: block;
      pointer-events: none;
    }

    /* ── Confetti animation ───────────────────────────────────── */
    @keyframes ludoConfetti {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ── Token picker in setup ───────────────────────────────── */
    .ludo-token-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 7px;
    }
    .ludo-token-btn {
      font-size: 1.3rem;
      width: 34px; height: 34px;
      border-radius: 9px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .ludo-token-btn:hover  { border-color: #6366f1; background: #ede9fe; }
    .ludo-token-btn.active { border-color: #6366f1; background: #ede9fe; transform: scale(1.15); }
  </style>
</head>
<body style="background:linear-gradient(135deg,#fff1f2,#f0f9ff);min-height:100vh">

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🎲</div>
    <div class="spinner"></div>
    <div class="loading-title">Ludo</div>
  </div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html"><span class="logo-emoji">🎮</span> Happy Games</a>
  <div class="nav-links">
    <span class="nav-user" id="nav-username" style="display:none">👤</span>
    <a href="../login.html" class="btn btn-secondary" id="nav-login-btn" style="font-size:.85rem">🔑 Login</a>
    <a href="../index.html" class="btn btn-secondary" style="font-size:.85rem">🏠 Home</a>
    <button class="btn btn-outline" id="nav-logout-btn" style="display:none;font-size:.85rem" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<div class="ludo-page">

  <!-- ── Setup screen (shown first) ── -->
  <div id="ludo-setup"></div>

  <!-- ── Game area (hidden until setup complete) ── -->
  <div id="ludo-game-area" style="display:none">
    <div class="ludo-layout">

      <!-- Left panel: dice + roll button + player info -->
      <div class="ludo-side-panel">
        <div class="ludo-player-info" id="ludo-player-info" style="font-size:.8rem;line-height:1.5;width:100%"></div>
        <div class="ludo-dice-split" id="ludo-dice-split">
          <div class="ludo-dice" id="ludo-dice-val">🎲</div>
          <div class="ludo-dice" id="ludo-dice-val-2">🎲</div>
        </div>
        <button class="btn btn-primary" id="ludo-roll-btn" onclick="LudoGame.rollDice()" disabled
                style="width:100%;padding:11px 6px;font-size:.88rem">🎲 Roll!</button>
        <div class="ludo-mode-badge" id="ludo-mode-badge">🌟 Kids Mode</div>
        <div class="ludo-finished" id="ludo-finished"
             style="font-size:.72rem;line-height:1.8;text-align:center;width:100%"></div>
      </div>

      <!-- Center: board + labels + status + legend -->
      <div class="ludo-board-wrap">
        <div class="ludo-status" id="ludo-status">Get ready…</div>

        <div class="ludo-corner-bar">
          <div class="ludo-corner-tag ludo-tag-green"  id="ludo-label-green">🟢 Green</div>
          <div class="ludo-corner-tag ludo-tag-yellow" id="ludo-label-yellow">🟡 Yellow</div>
        </div>

        <div class="ludo-board" id="ludo-board"></div>

        <div class="ludo-corner-bar">
          <div class="ludo-corner-tag ludo-tag-blue" id="ludo-label-blue">🔵 Blue</div>
          <div class="ludo-corner-tag ludo-tag-red"  id="ludo-label-red">🔴 Red</div>
        </div>

        <div class="ludo-legend" id="ludo-legend">
          <span>★ Safe square — no captures</span>
          <span id="ludo-legend-entry">🌟 Enter on 1 or 6!</span>
        </div>
      </div>

      <!-- Right panel: vs Friend online -->
      <div class="ludo-side-panel" style="justify-content:flex-start;padding-top:24px;gap:12px">
        <div style="font-size:1.9rem">🤝</div>
        <div style="font-family:'Fredoka One',cursive;font-size:.9rem;color:#1a1a2e">Online Play</div>
        <button onclick="LudoGame._startVsFriend()"
                style="background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;
                       border-radius:12px;padding:10px 8px;font-size:.8rem;font-weight:800;
                       cursor:pointer;font-family:'Fredoka One',cursive;width:100%;
                       transition:opacity .2s"
                onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
          🤝 vs Friend
        </button>
        <p style="font-size:.7rem;color:#aaa;font-weight:600;margin:0;line-height:1.4">
          🔑 Login required
        </p>
      </div>

    </div><!-- end .ludo-layout -->
  </div><!-- end #ludo-game-area -->

</div><!-- end .ludo-page -->

<!-- End-game overlay -->
<div class="sl-end-overlay" id="ludo-end" style="display:none">
  <div class="sl-end-card">
    <div class="sl-end-icon"  id="ludo-end-icon">🏆</div>
    <div class="sl-end-title" id="ludo-end-title">You Win!</div>
    <div class="sl-end-msg"   id="ludo-end-msg"></div>
    <div class="sl-end-stats" id="ludo-end-stats"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="btn btn-primary btn-lg" onclick="LudoGame.restartGame()">🔄 Play Again</button>
      <a href="../index.html" class="btn btn-secondary">🏠 Home</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/ludo.js"></script>
<script>
softAuth(() => { LudoGame.init(); });
</script>
</body>
</html>
