<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Spot the Difference vs Friend</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .sd-cell-opp-found {
      outline: 3px solid #ef4444;
      outline-offset: -2px;
      background: #fee2e2 !important;
    }
    .sd-cell-found {
      background: #bbf7d0 !important;
      outline: 3px solid #16a34a;
      outline-offset: -2px;
    }
  </style>
</head>
<body style="background:linear-gradient(135deg,#fffbeb,#fff0f6);min-height:100vh">

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🔍🏆</div>
    <div class="spinner"></div>
    <div class="loading-title">Spot the Difference vs Friend</div>
    <p style="opacity:.8;font-size:.9rem;font-weight:600">Setting up multiplayer…</p>
  </div>
</div>

<nav class="navbar">
  <a class="nav-logo" href="../index.html"><span class="logo-emoji">🎮</span> Happy Games</a>
  <div class="nav-links">
    <span class="nav-user" id="nav-username" style="display:none">👤</span>
    <a href="../index.html" class="btn btn-outline" style="font-size:.85rem">🏠 Home</a>
    <a href="history.html"  class="btn btn-outline" style="font-size:.85rem">📊 Results</a>
    <button class="btn btn-outline" id="nav-logout-btn"
            style="display:none;font-size:.85rem" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<div class="confetti-wrap" id="confetti-wrap"></div>

<div style="display:flex;justify-content:center;padding:32px 16px 48px;
            min-height:calc(100vh - 70px)">
  <div id="multi-root" style="width:100%;max-width:750px"></div>
</div>

<!-- Stale-opponent banner -->
<div id="stale-banner-sdm" class="stale-banner" style="display:none">
  <span class="stale-msg">⚠️ Your friend may have lost connection.</span>
  <div class="stale-btns">
    <button class="btn btn-primary"
            onclick="claimWinSDM()"
            style="padding:8px 18px;font-size:.85rem">🏆 Claim Win</button>
    <button class="btn stale-dismiss"
            onclick="hideStaleBannerSDM()">⏳ Keep Waiting</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/sound.js"></script>
<script src="../js/spot-diff-multi.js"></script>
</body>
</html>
