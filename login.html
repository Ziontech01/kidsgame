<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Games – Login / Sign Up</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">

<!-- Loading overlay — visible until Firebase resolves auth state -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner">
    <div style="font-size:3rem;margin-bottom:12px">🎮</div>
    <div class="spinner"></div>
    <div class="loading-title">Happy Games</div>
    <p style="opacity:.8;font-size:.95rem;font-weight:600">Checking your account…</p>
  </div>
</div>

<!-- Auth form — hidden until loading resolves (js/auth.js shows this) -->
<div class="auth-container" id="auth-container" style="display:none">
  <div class="auth-header">
    <div class="auth-brand"><span>🎮</span> Happy Games</div>
    <div class="auth-tagline">Fun games and quizzes for kids!</div>
  </div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">🔑 Login</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">✨ Sign Up</button>
    </div>

    <!-- Shared alert banner -->
    <div class="alert" id="auth-alert"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">👤 Username</label>
        <input type="text" id="login-username" class="form-input"
               placeholder="Enter your username" autocomplete="username"/>
        <div class="form-error" id="login-username-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Password</label>
        <input type="password" id="login-password" class="form-input"
               placeholder="Enter your password" autocomplete="current-password"/>
        <div class="form-error" id="login-password-error"></div>
      </div>
      <button type="submit" id="login-btn"
              class="btn btn-primary btn-full" style="margin-top:8px">
        🚀 Let's Play!
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label">😊 Your Name</label>
        <input type="text" id="signup-name" class="form-input"
               placeholder="What's your name?"/>
        <div class="form-error" id="signup-name-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">👤 Username</label>
        <input type="text" id="signup-username" class="form-input"
               placeholder="Pick a cool username" autocomplete="username"/>
        <div class="form-error" id="signup-username-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Password</label>
        <input type="password" id="signup-password" class="form-input"
               placeholder="At least 6 characters" autocomplete="new-password"/>
        <div class="form-error" id="signup-password-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Confirm Password</label>
        <input type="password" id="signup-confirm" class="form-input"
               placeholder="Type it again" autocomplete="new-password"/>
        <div class="form-error" id="signup-confirm-error"></div>
      </div>
      <button type="submit" id="signup-btn"
              class="btn btn-secondary btn-full" style="margin-top:8px">
        🎉 Create Account!
      </button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:.85rem;color:#888;font-weight:600">
      <a href="index.html" style="color:#667eea;font-weight:800">← Back to Home</a>
    </p>
  </div>
</div>

<!-- Firebase SDK (must load before firebase-config.js) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<!-- auth.js: defines hideLoading (which shows auth-container), handleLogin, handleSignup -->
<script src="js/auth.js"></script>
</body>
</html>
